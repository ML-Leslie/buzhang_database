<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" id="buzhang-svg" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                <defs>
                    <!-- Gradient Definition -->
                    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF80AB;stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#E91E63;stop-opacity:1"/>
                    </linearGradient>
                    <!-- Subtle Shadow for the letter -->
                    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
                        <feOffset dx="4" dy="8" result="offsetblur"/>
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.2"/>
                        </feComponentTransfer>
                        <feMerge> 
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/> 
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Background Shape (Squircle) -->
                <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#mainGradient)"/>
                
                <!-- The stylized "B" -->
                <g filter="url(#dropShadow)" transform="translate(0, 10)">
                    <!-- Vertical Stem -->
                    <rect x="135" y="110" width="70" height="292" rx="35" fill="white"/>
                    
                    <!-- Top Loop -->
                    <path d="M170 110 H 260 C 330 110 360 170 360 205 C 360 240 330 256 280 256 H 170 V 110 Z" fill="white"/>
                    <!-- Removed the extra circle here to clean up the design -->

                    <!-- Bottom Loop -->
                    <path d="M170 246 H 290 C 360 246 390 310 390 350 C 390 390 360 402 290 402 H 170 V 246 Z" fill="white"/>
                    
                    <!-- Cleanup/Detailing mask simulation using pink shapes to create the 'holes' of the B -->
                    <!-- Adjusted Top Hole to be better centered now that the circle is gone -->
                    <path d="M 215 145 H 250 C 285 145 300 160 300 190 C 300 220 285 235 250 235 H 215 V 145 Z" fill="url(#mainGradient)" opacity="0.9"/>
                    
                    <!-- Bottom Hole -->
                    <path d="M 215 285 H 280 C 320 285 330 310 330 345 C 330 380 320 395 280 395 H 215 V 285 Z" fill="url(#mainGradient)" opacity="0.9"/>
                </g>
            </svg>